name: Bug Report
description: Report a bug in data-chart
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce the behavior, or a minimal code example.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: The version of data-chart you are using.
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      description: The browser and version where the issue occurs.
      placeholder: e.g. Chrome 120
    validations:
      required: false
