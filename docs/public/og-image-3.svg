<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0a1d"/>
      <stop offset="40%" stop-color="#1a103a"/>
      <stop offset="100%" stop-color="#0c0a1d"/>
    </linearGradient>
    <radialGradient id="glow3a" cx="0.25" cy="0.45" r="0.35">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3b" cx="0.75" cy="0.5" r="0.4">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <linearGradient id="line3a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="line3b" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="line3c" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="area3a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="area3b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    <filter id="dotGlow3" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg3)"/>
  <rect width="1200" height="630" fill="url(#glow3a)"/>
  <rect width="1200" height="630" fill="url(#glow3b)"/>

  <!-- Full-width line chart backdrop -->
  <g transform="translate(0, 50)">
    <!-- Grid -->
    <line x1="100" y1="100" x2="1100" y2="100" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <line x1="100" y1="200" x2="1100" y2="200" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <line x1="100" y1="300" x2="1100" y2="300" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    <line x1="100" y1="400" x2="1100" y2="400" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

    <!-- Area fill for line 1 -->
    <path d="M 100 350 L 250 280 L 400 310 L 550 200 L 700 230 L 850 150 L 1000 180 L 1100 120 L 1100 450 L 100 450 Z" fill="url(#area3a)"/>
    <!-- Area fill for line 2 -->
    <path d="M 100 300 L 250 340 L 400 260 L 550 300 L 700 180 L 850 220 L 1000 130 L 1100 160 L 1100 450 L 100 450 Z" fill="url(#area3b)"/>

    <!-- Line 1 - purple -->
    <path d="M 100 350 L 250 280 L 400 310 L 550 200 L 700 230 L 850 150 L 1000 180 L 1100 120" fill="none" stroke="url(#line3a)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Line 2 - cyan -->
    <path d="M 100 300 L 250 340 L 400 260 L 550 300 L 700 180 L 850 220 L 1000 130 L 1100 160" fill="none" stroke="url(#line3b)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Line 3 - pink (shorter, foreground) -->
    <path d="M 100 380 L 250 360 L 400 390 L 550 340 L 700 300 L 850 270 L 1000 250 L 1100 200" fill="none" stroke="url(#line3c)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

    <!-- Data points on line 1 -->
    <circle cx="250" cy="280" r="4" fill="#a78bfa" filter="url(#dotGlow3)"/>
    <circle cx="550" cy="200" r="4" fill="#a78bfa" filter="url(#dotGlow3)"/>
    <circle cx="850" cy="150" r="4" fill="#a78bfa" filter="url(#dotGlow3)"/>

    <!-- Data points on line 2 -->
    <circle cx="400" cy="260" r="4" fill="#22d3ee" filter="url(#dotGlow3)"/>
    <circle cx="700" cy="180" r="4" fill="#22d3ee" filter="url(#dotGlow3)"/>
    <circle cx="1000" cy="130" r="4" fill="#22d3ee" filter="url(#dotGlow3)"/>
  </g>

  <!-- Central text block with frosted background -->
  <rect x="200" y="190" width="800" height="260" rx="20" fill="#0c0a1d" opacity="0.75"/>
  <rect x="200" y="190" width="800" height="260" rx="20" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="68" font-weight="800" fill="url(#titleGrad3)" text-anchor="middle" letter-spacing="-2">data-chart</text>

  <!-- Tagline -->
  <text x="600" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="400" fill="#cbd5e1" text-anchor="middle">Chart your tables. No JavaScript to write.</text>

  <!-- Feature badges - centered -->
  <g transform="translate(600, 375)" text-anchor="middle">
    <g transform="translate(-248, 0)">
      <rect x="0" y="0" width="108" height="30" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
      <text x="54" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500" fill="#c4b5fd" text-anchor="middle">Under 6KB</text>
    </g>
    <g transform="translate(-128, 0)">
      <rect x="0" y="0" width="120" height="30" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
      <text x="60" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500" fill="#c4b5fd" text-anchor="middle">6 Chart Types</text>
    </g>
    <g transform="translate(4, 0)">
      <rect x="0" y="0" width="136" height="30" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
      <text x="68" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500" fill="#c4b5fd" text-anchor="middle">No Dependencies</text>
    </g>
    <g transform="translate(152, 0)">
      <rect x="0" y="0" width="100" height="30" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="1"/>
      <text x="50" y="20" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500" fill="#c4b5fd" text-anchor="middle">TypeScript</text>
    </g>
  </g>
</svg>
