<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="bar2a" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="bar2b" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="bar2c" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="glow2f">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg2)"/>

  <!-- Large subtle glow circles -->
  <circle cx="900" cy="300" r="300" fill="#06b6d4" opacity="0.03"/>
  <circle cx="400" cy="500" r="250" fill="#3b82f6" opacity="0.03"/>

  <!-- Central large bar chart visualization -->
  <g transform="translate(580, 80)">
    <!-- Axis lines -->
    <line x1="0" y1="0" x2="0" y2="400" stroke="#334155" stroke-width="1"/>
    <line x1="0" y1="400" x2="540" y2="400" stroke="#334155" stroke-width="1"/>
    <!-- Horizontal grid -->
    <line x1="0" y1="100" x2="540" y2="100" stroke="#1e293b" stroke-width="1"/>
    <line x1="0" y1="200" x2="540" y2="200" stroke="#1e293b" stroke-width="1"/>
    <line x1="0" y1="300" x2="540" y2="300" stroke="#1e293b" stroke-width="1"/>

    <!-- Bars - Group 1 -->
    <rect x="30" y="200" width="35" height="200" rx="3" fill="url(#bar2a)" opacity="0.85"/>
    <rect x="70" y="140" width="35" height="260" rx="3" fill="url(#bar2b)" opacity="0.85"/>
    <rect x="110" y="240" width="35" height="160" rx="3" fill="url(#bar2c)" opacity="0.85"/>

    <!-- Bars - Group 2 -->
    <rect x="180" y="120" width="35" height="280" rx="3" fill="url(#bar2a)" opacity="0.85"/>
    <rect x="220" y="60" width="35" height="340" rx="3" fill="url(#bar2b)" opacity="0.85"/>
    <rect x="260" y="180" width="35" height="220" rx="3" fill="url(#bar2c)" opacity="0.85"/>

    <!-- Bars - Group 3 -->
    <rect x="330" y="80" width="35" height="320" rx="3" fill="url(#bar2a)" opacity="0.85"/>
    <rect x="370" y="30" width="35" height="370" rx="3" fill="url(#bar2b)" opacity="0.85"/>
    <rect x="410" y="150" width="35" height="250" rx="3" fill="url(#bar2c)" opacity="0.85"/>

    <!-- Bars - Group 4 -->
    <rect x="480" y="160" width="35" height="240" rx="3" fill="url(#bar2a)" opacity="0.5"/>
    <rect x="480" y="160" width="35" height="240" rx="3" fill="url(#bar2a)" opacity="0.3"/>
  </g>

  <!-- Title - overlaid on left -->
  <text x="80" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="800" fill="#f8fafc" letter-spacing="-2">data-chart</text>

  <!-- Tagline -->
  <text x="80" y="300" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="24" font-weight="400" fill="#94a3b8">Chart your tables. No JavaScript to write.</text>

  <!-- Accent line under tagline -->
  <rect x="80" y="320" width="120" height="3" rx="1.5" fill="url(#accent2)"/>

  <!-- Feature badges -->
  <g transform="translate(80, 365)">
    <g>
      <rect x="0" y="0" width="108" height="32" rx="16" fill="transparent" stroke="#334155" stroke-width="1"/>
      <text x="54" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#94a3b8" text-anchor="middle">Under 6KB</text>
    </g>
    <g transform="translate(120, 0)">
      <rect x="0" y="0" width="130" height="32" rx="16" fill="transparent" stroke="#334155" stroke-width="1"/>
      <text x="65" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#94a3b8" text-anchor="middle">6 Chart Types</text>
    </g>
    <g transform="translate(262, 0)">
      <rect x="0" y="0" width="146" height="32" rx="16" fill="transparent" stroke="#334155" stroke-width="1"/>
      <text x="73" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#94a3b8" text-anchor="middle">No Dependencies</text>
    </g>
    <g transform="translate(420, 0)">
      <rect x="0" y="0" width="112" height="32" rx="16" fill="transparent" stroke="#334155" stroke-width="1"/>
      <text x="56" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#94a3b8" text-anchor="middle">TypeScript</text>
    </g>
  </g>

  <!-- Bottom subtle line -->
  <rect x="0" y="628" width="1200" height="2" fill="url(#accent2)" opacity="0.4"/>
</svg>
