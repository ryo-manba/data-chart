<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0f0f2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="0.7" cy="0.35" r="0.4">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.3" cy="0.7" r="0.3">
      <stop offset="0%" stop-color="#172554" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="glowDot" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="dashBorder" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.08"/>
    </linearGradient>
    <!-- Colors -->
    <linearGradient id="cyan" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0e7490"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#be185d"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="areaLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="0" y="0" width="1200" height="2" fill="#38bdf8" opacity="0.3"/>

  <!-- ===== Right side: Dashboard with single card, 4 mini-charts ===== -->
  <g transform="translate(620, 45)" filter="url(#shadow)">
    <!-- Main dashboard card -->
    <rect x="0" y="0" width="530" height="540" rx="20" fill="#0a0a20" stroke="url(#dashBorder)" stroke-width="1.5"/>

    <!-- Card header -->
    <rect x="0" y="0" width="530" height="44" rx="20" fill="#111135" opacity="0.5"/>
    <rect x="0" y="20" width="530" height="24" fill="#111135" opacity="0.5"/>
    <!-- Header dots -->
    <circle cx="24" cy="22" r="5" fill="#ef4444" opacity="0.5"/>
    <circle cx="42" cy="22" r="5" fill="#eab308" opacity="0.5"/>
    <circle cx="60" cy="22" r="5" fill="#22c55e" opacity="0.5"/>
    <text x="265" y="27" font-family="-apple-system, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Dashboard</text>

    <!-- Divider -->
    <line x1="20" y1="44" x2="510" y2="44" stroke="#1e293b" stroke-width="1"/>

    <!-- === Top-left: Bar chart === -->
    <g transform="translate(25, 60)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">Revenue</text>
      <text x="215" y="14" font-family="-apple-system, sans-serif" font-size="10" fill="#34d399" text-anchor="end">+12.4%</text>
      <g transform="translate(0, 25)">
        <line x1="0" y1="170" x2="215" y2="170" stroke="#1e293b" stroke-width="1"/>
        <rect x="5" y="90" width="20" height="80" rx="3" fill="url(#cyan)" opacity="0.8"/>
        <rect x="32" y="50" width="20" height="120" rx="3" fill="url(#blue)" opacity="0.8"/>
        <rect x="59" y="70" width="20" height="100" rx="3" fill="url(#cyan)" opacity="0.8"/>
        <rect x="86" y="30" width="20" height="140" rx="3" fill="url(#blue)" opacity="0.8"/>
        <rect x="113" y="10" width="20" height="160" rx="3" fill="url(#cyan)" opacity="0.8"/>
        <rect x="140" y="40" width="20" height="130" rx="3" fill="url(#blue)" opacity="0.8"/>
        <rect x="167" y="55" width="20" height="115" rx="3" fill="url(#cyan)" opacity="0.8"/>
        <rect x="194" y="25" width="20" height="145" rx="3" fill="url(#blue)" opacity="0.8"/>
      </g>
    </g>

    <!-- Vertical divider -->
    <line x1="265" y1="60" x2="265" y2="280" stroke="#1e293b" stroke-width="1"/>

    <!-- === Top-right: Donut chart === -->
    <g transform="translate(395, 165)">
      <text x="0" y="-90" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">Distribution</text>
      <!-- Background ring -->
      <circle cx="0" cy="0" r="60" fill="none" stroke="#1e293b" stroke-width="14"/>
      <!-- Segments -->
      <circle cx="0" cy="0" r="60" fill="none" stroke="url(#cyan)" stroke-width="14" stroke-dasharray="120 257" stroke-dashoffset="0" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="60" fill="none" stroke="url(#violet)" stroke-width="14" stroke-dasharray="80 297" stroke-dashoffset="-130" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="60" fill="none" stroke="url(#pink)" stroke-width="14" stroke-dasharray="55 322" stroke-dashoffset="-220" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="60" fill="none" stroke="url(#green)" stroke-width="14" stroke-dasharray="45 332" stroke-dashoffset="-285" stroke-linecap="round"/>
      <!-- Center -->
      <text x="0" y="5" font-family="-apple-system, sans-serif" font-size="18" font-weight="700" fill="#f1f5f9" text-anchor="middle">4.2K</text>
    </g>

    <!-- Horizontal divider -->
    <line x1="20" y1="290" x2="510" y2="290" stroke="#1e293b" stroke-width="1"/>

    <!-- === Bottom: Wide area/line chart === -->
    <g transform="translate(25, 305)">
      <text x="0" y="14" font-family="-apple-system, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">Trends</text>
      <text x="485" y="14" font-family="-apple-system, sans-serif" font-size="10" fill="#64748b" text-anchor="end">Last 12 months</text>

      <g transform="translate(0, 30)">
        <!-- Grid -->
        <line x1="0" y1="0" x2="485" y2="0" stroke="#1e293b" stroke-width="1"/>
        <line x1="0" y1="50" x2="485" y2="50" stroke="#1e293b" stroke-width="1"/>
        <line x1="0" y1="100" x2="485" y2="100" stroke="#1e293b" stroke-width="1"/>
        <line x1="0" y1="150" x2="485" y2="150" stroke="#1e293b" stroke-width="1"/>

        <!-- Area -->
        <path d="M 0 170 L 0 130 L 40 120 L 80 110 L 120 90 L 160 100 L 200 80 L 240 70 L 280 60 L 320 50 L 360 55 L 400 35 L 440 30 L 485 15 L 485 170 Z" fill="url(#areaFill)"/>
        <!-- Line -->
        <path d="M 0 130 L 40 120 L 80 110 L 120 90 L 160 100 L 200 80 L 240 70 L 280 60 L 320 50 L 360 55 L 400 35 L 440 30 L 485 15" fill="none" stroke="url(#areaLine)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Dots -->
        <circle cx="120" cy="90" r="3.5" fill="#22d3ee" filter="url(#glowDot)"/>
        <circle cx="280" cy="60" r="3.5" fill="#22d3ee" filter="url(#glowDot)"/>
        <circle cx="440" cy="30" r="3.5" fill="#22d3ee" filter="url(#glowDot)"/>

        <!-- Second line (purple, subtle) -->
        <path d="M 0 140 L 40 135 L 80 130 L 120 120 L 160 125 L 200 110 L 240 100 L 280 95 L 320 85 L 360 80 L 400 70 L 440 60 L 485 45" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
      </g>
    </g>
  </g>

  <!-- Floating dots -->
  <circle cx="600" cy="200" r="2" fill="#22d3ee" opacity="0.2"/>
  <circle cx="610" cy="480" r="2" fill="#a78bfa" opacity="0.15"/>
  <circle cx="1170" cy="100" r="2" fill="#f472b6" opacity="0.15"/>

  <!-- ===== Text Content (left side) ===== -->
  <text x="80" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="800" fill="#7dd3fc" letter-spacing="-1">data-chart</text>
  <text x="80" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="400" fill="#e2e8f0" opacity="0.9">Chart your tables. No JavaScript to write.</text>
  <g transform="translate(80, 360)">
    <g>
      <rect x="0" y="0" width="108" height="32" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="1"/>
      <text x="54" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#7dd3fc" text-anchor="middle">Under 6KB</text>
    </g>
    <g transform="translate(120, 0)">
      <rect x="0" y="0" width="130" height="32" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="1"/>
      <text x="65" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#7dd3fc" text-anchor="middle">6 Chart Types</text>
    </g>
    <g transform="translate(262, 0)">
      <rect x="0" y="0" width="146" height="32" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="1"/>
      <text x="73" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#7dd3fc" text-anchor="middle">No Dependencies</text>
    </g>
    <g transform="translate(420, 0)">
      <rect x="0" y="0" width="112" height="32" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="1"/>
      <text x="56" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#7dd3fc" text-anchor="middle">TypeScript</text>
    </g>
  </g>
</svg>
