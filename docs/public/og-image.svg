<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0f0f2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>
    <!-- Glow effect -->
    <radialGradient id="glow1" cx="0.7" cy="0.35" r="0.4">
      <stop offset="0%" stop-color="#1e1b4b" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.3" cy="0.7" r="0.3">
      <stop offset="0%" stop-color="#172554" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <!-- Bar chart gradient -->
    <linearGradient id="bar1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <!-- Line chart gradient -->
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <!-- Area fill -->
    <linearGradient id="areaFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <!-- Donut gradient -->
    <linearGradient id="donut1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="donut2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <!-- Subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
    </pattern>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Subtle border glow at top -->
  <rect x="0" y="0" width="1200" height="2" fill="#38bdf8" opacity="0.3"/>

  <!-- ===== Decorative Chart Elements (right side) ===== -->

  <!-- Bar chart group -->
  <g transform="translate(720, 120)" filter="url(#shadow)">
    <!-- Background card -->
    <rect x="-15" y="-15" width="200" height="230" rx="16" fill="#111133" opacity="0.6" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <!-- Grid lines -->
    <line x1="0" y1="40" x2="170" y2="40" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="0" y1="90" x2="170" y2="90" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    <line x1="0" y1="140" x2="170" y2="140" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    <!-- Bars -->
    <rect x="10" y="100" width="30" height="90" rx="4" fill="url(#bar1)" opacity="0.9"/>
    <rect x="50" y="55" width="30" height="135" rx="4" fill="url(#bar2)" opacity="0.9"/>
    <rect x="90" y="20" width="30" height="170" rx="4" fill="url(#bar3)" opacity="0.9"/>
    <rect x="130" y="70" width="30" height="120" rx="4" fill="url(#bar1)" opacity="0.9"/>
  </g>

  <!-- Line/Area chart group -->
  <g transform="translate(960, 150)" filter="url(#shadow)">
    <!-- Background card -->
    <rect x="-15" y="-15" width="210" height="190" rx="16" fill="#111133" opacity="0.6" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <!-- Area fill -->
    <path d="M 0 140 L 0 100 Q 30 40, 60 70 Q 90 100, 120 50 Q 150 10, 180 30 L 180 140 Z" fill="url(#areaFill)"/>
    <!-- Line -->
    <path d="M 0 100 Q 30 40, 60 70 Q 90 100, 120 50 Q 150 10, 180 30" fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- Data points -->
    <circle cx="0" cy="100" r="4" fill="#a78bfa" filter="url(#glowFilter)"/>
    <circle cx="60" cy="70" r="4" fill="#a78bfa" filter="url(#glowFilter)"/>
    <circle cx="120" cy="50" r="4" fill="#a78bfa" filter="url(#glowFilter)"/>
    <circle cx="180" cy="30" r="4" fill="#a78bfa" filter="url(#glowFilter)"/>
  </g>

  <!-- Donut chart group -->
  <g transform="translate(830, 410)" filter="url(#shadow)">
    <!-- Background card -->
    <rect x="-80" y="-80" width="160" height="160" rx="16" fill="#111133" opacity="0.6" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    <!-- Donut segments -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#donut1)" stroke-width="16" stroke-dasharray="110 204" stroke-dashoffset="0" stroke-linecap="round" opacity="0.9"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#donut2)" stroke-width="16" stroke-dasharray="80 234" stroke-dashoffset="-120" stroke-linecap="round" opacity="0.9"/>
    <circle cx="0" cy="0" r="50" fill="none" stroke="#38bdf8" stroke-width="16" stroke-dasharray="60 254" stroke-dashoffset="-210" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Connecting lines between charts -->
  <g stroke="#38bdf8" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 4">
    <line x1="900" y1="335" x2="830" y2="350"/>
    <line x1="960" y1="325" x2="980" y2="340"/>
  </g>

  <!-- Small floating dots -->
  <circle cx="680" cy="180" r="3" fill="#38bdf8" opacity="0.3"/>
  <circle cx="1150" cy="400" r="2" fill="#a78bfa" opacity="0.3"/>
  <circle cx="1100" cy="140" r="2.5" fill="#f472b6" opacity="0.25"/>
  <circle cx="700" cy="480" r="2" fill="#34d399" opacity="0.3"/>

  <!-- ===== Text Content (left side) ===== -->

  <!-- Title -->
  <text x="80" y="250" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="64" font-weight="800" fill="#7dd3fc" letter-spacing="-1">data-chart</text>

  <!-- Tagline -->
  <text x="80" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="400" fill="#e2e8f0" opacity="0.9">Chart your tables. No JavaScript to write.</text>

  <!-- Feature badges -->
  <g transform="translate(80, 360)">
    <!-- Badge: Under 6KB -->
    <g>
      <rect x="0" y="0" width="108" height="32" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="1"/>
      <text x="54" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#7dd3fc" text-anchor="middle">Under 6KB</text>
    </g>
    <!-- Badge: 6 Chart Types -->
    <g transform="translate(120, 0)">
      <rect x="0" y="0" width="130" height="32" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="1"/>
      <text x="65" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#7dd3fc" text-anchor="middle">6 Chart Types</text>
    </g>
    <!-- Badge: No Dependencies -->
    <g transform="translate(262, 0)">
      <rect x="0" y="0" width="146" height="32" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="1"/>
      <text x="73" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#7dd3fc" text-anchor="middle">No Dependencies</text>
    </g>
    <!-- Badge: TypeScript -->
    <g transform="translate(420, 0)">
      <rect x="0" y="0" width="112" height="32" rx="6" fill="#1e293b" stroke="#38bdf8" stroke-opacity="0.3" stroke-width="1"/>
      <text x="56" y="21" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#7dd3fc" text-anchor="middle">TypeScript</text>
    </g>
  </g>
</svg>
